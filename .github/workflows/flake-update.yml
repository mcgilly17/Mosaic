name: Flake Update

on:
  schedule:
    - cron: "0 0 * * 6" # Every Friday at midnight UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Update flake inputs
        run: nix flake update

      - name: Check build
        run: nix build

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(flake): update flake inputs"
          title: "chore(flake): weekly flake update"
          body: |
            Automated weekly update of flake inputs.

            Please review the `flake.lock` changes and ensure the build passes before merging.
          branch: chore/flake-update
          delete-branch: true
